version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stratify
      POSTGRES_PASSWORD: stratify_secret
      POSTGRES_DB: stratify_core_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratify"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://stratify:stratify_secret@db:5432/stratify_core_development
      REDIS_URL: redis://redis:6379/0
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  analysis_engine:
    build:
      context: ../stratify-analysis-engine
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      CORE_API_URL: http://core:3000
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started
    restart: unless-stopped

  feedback_consumer:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -c "bundle exec ruby bin/feedback_consumer"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://stratify:stratify_secret@db:5432/stratify_core_development
      REDIS_URL: redis://redis:6379/0
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      core:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
